---
# Playbook to deploy the Magnipoc docker container
- name: Deploy Magnipoc container
  # Accepts variable 'target' to specify host or group (e.g., 'robots', 'magni1', 'magni2')
  hosts: "{{ target | default('robots') }}"
  become: yes
  vars_files:
    - vars.yml
  collections:
    - community.docker
  tasks:
    - name: Ensure docker python dependencies are available (Debian/Ubuntu)
      apt:
        name: python3-docker
        state: present
      when: ansible_facts['os_family'] == 'Debian'

    - name: Pull Magnipoc image
      community.docker.docker_image:
        name: "{{ magnipoc_image }}"
        source: pull

    - name: Ensure old magnipoc container is absent
      community.docker.docker_container:
        name: magnipoc
        state: absent
        force_kill: yes

    - name: Reload udev rules
      command: udevadm control --reload

    - name: Trigger udev to apply rules for joystick
      command: udevadm trigger
      register: udev_trigger
      changed_when: udev_trigger.rc == 0

    - name: Run magnipoc container
      community.docker.docker_container:
        name: magnipoc
        image: "{{ magnipoc_image }}"
        state: started
        restart_policy: unless-stopped
        detach: true
        devices:
          - "/dev/serial0:/dev/ttyAMA0"
          - "/dev/i2c-1:/dev/i2c-1"
          - "/dev/ttyUSB0:/dev/ttyUSB0"
        capabilities:
          - SYS_NICE
        ulimits:
          - rtprio:99:99
          - memlock:-1:-1
