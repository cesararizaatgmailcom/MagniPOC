---
# Playbook to deploy the Magnipoc docker container
- name: Deploy Magnipoc container
  # Accepts variable 'target' to specify host or group (e.g., 'robots', 'magni1', 'magni2')
  hosts: "{{ target | default('robots') }}"
  become: yes
  vars_files:
    - vars.yml
  collections:
    - community.docker
  tasks:
    - name: Ensure docker python dependencies are available (Debian/Ubuntu)
      apt:
        name: python3-docker
        state: present
      when: ansible_facts['os_family'] == 'Debian'

    - name: Reload udev rules
      command: udevadm control --reload

    - name: Trigger udev to apply rules for joystick
      command: udevadm trigger
      register: udev_trigger
      changed_when: udev_trigger.rc == 0

    - name: Check if /dev/ttyUSB0 exists
      stat:
        path: /dev/ttyUSB0
      register: tty_usb

    - name: Set device mapping list for magnipoc container
      set_fact:
        magnipoc_devices: "{{ ['/dev/serial0:/dev/ttyAMA0', '/dev/i2c-1:/dev/i2c-1'] + (['/dev/ttyUSB0:/dev/ttyUSB0'] if tty_usb.stat.exists else []) }}"

    - name: Warn when /dev/ttyUSB0 not present (skipping mapping)
      debug:
        msg: "/dev/ttyUSB0 not found, skipping device mapping"
      when: not tty_usb.stat.exists

    - name: Run magnipoc container
      community.docker.docker_container:
        name: magnipoc
        image: "{{ magnipoc_image }}"
        pull: true
        state: started
        restart_policy: unless-stopped
        detach: true
        devices: "{{ magnipoc_devices }}"
        capabilities:
          - SYS_NICE
        ulimits:
          - rtprio:99:99
          - memlock:-1:-1
