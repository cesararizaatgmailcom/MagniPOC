---
# Playbook to deploy the control station docker container
- name: Deploy Control Station container
  hosts: control_station
  become: yes
  vars_files:
    - vars.yml
  collections:
    - community.docker
  tasks:
    - name: Ensure docker python dependencies are available (Debian/Ubuntu)
      apt:
        name: python3-docker
        state: present
      when: ansible_facts['os_family'] == 'Debian'

    - name: Create udev rule for joystick and create stable symlink
      copy:
        dest: /etc/udev/rules.d/99-magnipoc-joystick.rules
        content: 'KERNEL=="{{ magnipoc_js_kernel }}", SUBSYSTEM=="input", MODE="0660", SYMLINK+="{{ magnipoc_js_symlink_basename }}"'
        owner: root
        group: root
        mode: '0644'

    - name: Reload udev rules
      command: udevadm control --reload

    - name: Trigger udev to apply rules for joystick
      command: udevadm trigger
      register: udev_trigger
      changed_when: udev_trigger.rc == 0

    - name: Check if /dev/input/js0 exists
      stat:
        path: /dev/input/js0
      register: js0

    - name: Set device mapping list for control_station container
      set_fact:
        control_station_devices: "{{ [ (magnipoc_js_symlink ~ ':/dev/input/js0') ] if js0.stat.exists else [] }}"

    - name: Warn when /dev/input/js0 not present (skipping mapping)
      debug:
        msg: "/dev/input/js0 not found, skipping device mapping"
      when: not js0.stat.exists

    - name: Run control_station container
      community.docker.docker_container:
        name: control_station
        image: "{{ control_station_image }}"
        pull: true
        state: started
        restart_policy: unless-stopped
        detach: true
        network_mode: host
        devices: "{{ control_station_devices }}"
        # Enable NVIDIA rendering support when available on host
        runtime: nvidia
        gpus: all
        device_requests:
          - driver: nvidia
            count: -1
            capabilities:
              - gpu
        volumes:
          - "/tmp/.X11-unix:/tmp/.X11-unix"
        env:
          DISPLAY: "{{ control_station_display }}"
          NVIDIA_VISIBLE_DEVICES: "{{ NVIDIA_VISIBLE_DEVICES | default('all') }}"
          NVIDIA_DRIVER_CAPABILITIES: "{{ NVIDIA_DRIVER_CAPABILITIES | default('all') }}"
          __GLX_VENDOR_LIBRARY_NAME: "{{ __GLX_VENDOR_LIBRARY_NAME | default('nvidia') }}"
        capabilities:
          - SYS_NICE
