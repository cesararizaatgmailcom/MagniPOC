name: Deploy using Ansible

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target: control_station, magni robots (magnipoc), or all"
        required: true
        default: all
        type: choice
        options:
          - control_station
          - magnipoc
          - all

jobs:
  deploy:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible and collections
        run: |
          python -m pip install --upgrade pip
          pip install 'ansible>=8.0.0'
          ansible-galaxy collection install community.docker || true

      - name: Show chosen target
        run: echo "Deploy target = '${{ github.event.inputs.target }}'"

      - name: Deploy Control Station
        if: ${{ github.event.inputs.target == 'control_station' || github.event.inputs.target == 'all' }}
        run: |
          ansible-playbook ansible/playbooks/deploy_control_station.yml -i ansible/inventories/hosts.ini

      - name: Deploy Magnipoc robots
        if: ${{ github.event.inputs.target == 'magnipoc' || github.event.inputs.target == 'all' }}
        run: |
          ansible-playbook ansible/playbooks/deploy_magnipoc.yml -i ansible/inventories/hosts.ini