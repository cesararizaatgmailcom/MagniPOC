name: Mapping smoke test

on: [workflow_dispatch]

jobs:
  mapping-smoke-test:
    name: Mapping smoke test (self-hosted GPU)
    runs-on: self-hosted
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build devcontainer image
        run: |
          docker build --file .devcontainer/gpu-simulation/Dockerfile -t magni-gpu-sim .

      - name: Run mapping integration tests in container
        # Mount workspace into /home/ws to preserve artifacts
        run: |
          docker run --rm --privileged --gpus all -v "${{ github.workspace }}:/home/ws" -w /home/ws magni-gpu-sim /bin/bash -lc "set -e; ./scripts/run-mapping-smoke-test.sh magni_integration_tests"

      - name: Upload map artifact
        uses: actions/upload-artifact@v4
        with:
          name: mapping-artifacts
          path: |
            map.pbstream
            *.log
